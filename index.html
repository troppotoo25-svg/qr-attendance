
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Attendance Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

h2{
color:#0b57d0;
}

video{
width:100%;
max-width:450px;
height:320px;
border:3px solid #0b57d0;
border-radius:12px;
background:black;
object-fit:cover;
}

button{
padding:15px 20px;
font-size:18px;
background:#0b57d0;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

#msg{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#0b57d0;
word-wrap:break-word;
}

iframe{
display:none;
}

</style>

</head>

<body>

<h2>QR Attendance Scanner</h2>

<video id="video" autoplay playsinline></video>

<br>

<button id="startBtn">
START CAMERA
</button>

<div id="msg">
Ready
</div>

<iframe name="hiddenFrame"></iframe>

<form
id="hiddenForm"
target="hiddenFrame"
method="POST"
action="https://script.google.com/macros/s/AKfycby6DS3_N_wtthb6tduumI_yQBDClM1a_F4HRwV1CME3XlV28WKgD1WNKxdHwYHFy-s/exec">

<input
type="hidden"
name="adm"
id="hiddenAdm">

</form>

<script>

const startBtn =
document.getElementById("startBtn");

const msg =
document.getElementById("msg");

const video =
document.getElementById("video");

startBtn.onclick = async function(){

  try{

    const stream =
    await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:false
    });

    video.srcObject = stream;

    await video.play();

    msg.innerHTML =
    "Scanning...";

    const codeReader =
    new ZXing.BrowserQRCodeReader();

    codeReader.decodeFromVideoDevice(
      null,
      video,
      (result, err) => {

       if(result){

  const adm =
  result.getText().trim();

  msg.innerHTML =
  "QR FOUND: " + adm;

}

          alert(
            "QR FOUND: " +
            result.getText()
          );

        }

      }
    );

  }

  catch(e){

    alert(
      "CAMERA ERROR: " +
      e.message
    );

  }

};

</script>
</body>

</html>
