```html
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Attendance Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

h2{
color:#0b57d0;
}

video{
width:100%;
max-width:450px;
height:320px;
border:3px solid #0b57d0;
border-radius:12px;
background:black;
object-fit:cover;
}

button{
padding:15px 20px;
font-size:18px;
background:#0b57d0;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

#msg{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#0b57d0;
word-wrap:break-word;
}

iframe{
display:none;
}

</style>

</head>

<body>

<h2>QR Attendance Scanner</h2>

<video id="video" autoplay playsinline></video>

<br>

<button id="startBtn">
START CAMERA
</button>

<div id="msg">
Ready
</div>

<iframe name="hiddenFrame"></iframe>

<form
id="hiddenForm"
target="hiddenFrame"
method="POST"
action="https://script.google.com/macros/s/AKfycbxnNLl0oohFzeSH1tTXHVuhgosQi5M1JP5i98tT1NKTx0YUHf2lyNChjfhSQJTMWAnV/exec">

<input
type="hidden"
name="adm"
id="hiddenAdm">

</form>

<script>

const video =
document.getElementById("video");

const msg =
document.getElementById("msg");

const startBtn =
document.getElementById("startBtn");

const hiddenForm =
document.getElementById("hiddenForm");

const hiddenAdm =
document.getElementById("hiddenAdm");

let scanLock = false;

let lastScanTime = 0;

const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

startBtn.onclick = startScanner;

async function startScanner(){

  try{

    msg.innerHTML =
    "Opening camera...";

    const stream =
    await navigator.mediaDevices.getUserMedia({

      video:{
        facingMode:"environment"
      },

      audio:false

    });

    video.srcObject = stream;

    await video.play();

    msg.innerHTML =
    "Scanning QR code...";

    const codeReader =
    new ZXing.BrowserMultiFormatReader();

    codeReader.decodeFromVideoDevice(

      null,
      video,

      (result, err) => {

        if(result){

          const now = Date.now();

          if(
            scanLock ||
            now - lastScanTime < 5000
          ){
            return;
          }

          scanLock = true;

          lastScanTime = now;

          const text =
          result.getText().trim();

          beep.play();

          msg.innerHTML =
          "QR DETECTED: " + text;

          hiddenAdm.value = text;

          hiddenForm.submit();

          msg.innerHTML =
          "Attendance Saved";

          setTimeout(() => {

            scanLock = false;

            msg.innerHTML =
            "Ready";

          },5000);

        }

      }

    );

  }

  catch(e){

    console.log(e);

    msg.innerHTML =
    "CAMERA ERROR: " + e.message;

  }

}

</script>

</body>

</html>
```
