<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Attendance Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

h2{
color:#0b57d0;
}

video{
width:100%;
max-width:450px;
height:320px;
border:3px solid #0b57d0;
border-radius:12px;
background:black;
object-fit:cover;
}

button{
padding:15px 20px;
font-size:18px;
background:#0b57d0;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

#msg{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#0b57d0;
word-wrap:break-word;
}

iframe{
display:none;
}

</style>

</head>

<body>

<h2>QR Attendance Scanner</h2>

<video id="video" autoplay playsinline></video>

<br>

<button id="startBtn">
START CAMERA
</button>

<div id="msg">
Ready
</div>

<iframe name="hiddenFrame"></iframe>

<form id="hiddenForm"
target="hiddenFrame"
method="POST"
action="https://script.google.com/macros/s/AKfycbxT_HSffRcn3ReM_hHc19SSI7s8-tNMgHRviSrYSA2mFYGfTDbJxn1z-ZEavuhjlE_c/exec">

<input
type="hidden"
name="data"
id="hiddenData">

</form>

<script>

const video =
document.getElementById("video");

const msg =
document.getElementById("msg");

const startBtn =
document.getElementById("startBtn");

const hiddenForm =
document.getElementById("hiddenForm");

const hiddenData =
document.getElementById("hiddenData");

let scanLock = false;

let lastScan = "";

const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

startBtn.onclick = startScanner;

async function startScanner(){

try{

msg.innerHTML =
"Opening camera...";

const stream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment"
},

audio:false

});

video.srcObject = stream;

await video.play();

msg.innerHTML =
"Scanning QR code...";

const codeReader =
new ZXing.BrowserMultiFormatReader();

codeReader.decodeFromVideoDevice(

null,
video,

(result, err) => {

if(result){

const text =
result.getText().trim();

if(scanLock || text === lastScan)
return;

scanLock = true;

lastScan = text;

beep.play();

msg.innerHTML =
"QR DETECTED: " + text;

hiddenData.value =
JSON.stringify({
adm:text
});

hiddenForm.submit();

msg.innerHTML =
"Attendance Saved";

setTimeout(() => {

scanLock = false;

lastScan = "";

msg.innerHTML =
"Ready";

},3000);

}

}

);

}catch(e){

console.log(e);

msg.innerHTML =
"CAMERA ERROR: " + e.message;

}

}

</script>

</body>

</html>
