<!DOCTYPE html>
<html>

<head>
<title>QR Test</title>
</head>

<body>

<h1>QR Attendance System</h1>

<button onclick="startCam()">
START CAMERA
</button>

<br><br>

<video
id="video"
autoplay
playsinline
width="300">
</video>

<script>

async function startCam(){

const video =
document.getElementById("video");

const stream =
await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject = stream;

}

</script>

</body>
</html>
