<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Attendance Scanner</title>

<!-- ZXING -->
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

h2{
color:#0b57d0;
}

video{
width:100%;
max-width:450px;
height:320px;
border:3px solid #0b57d0;
border-radius:12px;
background:black;
object-fit:cover;
}

button{
padding:15px 20px;
font-size:18px;
background:#0b57d0;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

#msg{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#0b57d0;
word-wrap:break-word;
}

</style>

</head>

<body>

<h2>QR Attendance Scanner</h2>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="startScanner()">
START CAMERA
</button>

<div id="msg">
Ready
</div>

<script>

const video =
document.getElementById("video");

const msg =
document.getElementById("msg");

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwlQl7zFPBggRmYfe1CJ3R3WV5iotGXYMuCvTK7-FEwbC1W8u6bzSohKWMbmIJesANk/exec";

let scanLock = false;
let lastScan = "";

const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

async function startScanner(){

try{

/* CHECK ZXING */

if(typeof ZXing === "undefined"){

msg.innerHTML =
"ZXing library failed to load";

return;

}

msg.innerHTML =
"Opening camera...";

const stream =
await navigator.mediaDevices.getUserMedia({

video:true,
audio:false

});

video.srcObject = stream;

await video.play();

msg.innerHTML =
"Scanning QR code...";

const codeReader =
new ZXing.BrowserMultiFormatReader();

codeReader.decodeFromVideoDevice(

null,
video,

(result, err) => {

if(result){

const text =
result.getText().trim();

if(scanLock || text === lastScan)
return;

scanLock = true;

lastScan = text;

beep.play();

msg.innerHTML =
"QR DETECTED: " + text;

/* SEND TO APPS SCRIPT */

fetch(SCRIPT_URL, {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
adm:text
})

})

.then(async res => {

const text = await res.text();

console.log(text);

try{

return JSON.parse(text);

}catch(e){

throw new Error(text);

}

})

.then(data => {

msg.innerHTML =
data.message;

setTimeout(() => {

scanLock = false;

lastScan = "";

msg.innerHTML =
"Ready for next scan";

}, 3000);

})

.catch(async error => {

console.log(error);

msg.innerHTML =
"ERROR CHECK CONSOLE";

alert(
"Open browser console:\n\nPress F12\nThen click Console"
);

scanLock = false;

});
}

if(
err &&
!(err instanceof ZXing.NotFoundException)
){

console.log(err);

}

}

);

}catch(e){

msg.innerHTML =
"CAMERA ERROR: " + e.message;

console.log(e);

}

}

</script>

</body>

</html>
