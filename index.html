<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Attendance Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

h2{
color:#0b57d0;
}

video{
width:100%;
max-width:450px;
height:320px;
border:3px solid #0b57d0;
border-radius:12px;
background:black;
object-fit:cover;
}

button{
padding:15px 20px;
font-size:18px;
background:#0b57d0;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

#msg{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#0b57d0;
word-wrap:break-word;
}

</style>

</head>

<body>

<h2>QR Attendance Scanner</h2>

<video
id="video"
autoplay
playsinline>
</video>

<br>

<button onclick="startScanner()">
START CAMERA
</button>

<div id="msg">
Ready
</div>

<script>

const video =
document.getElementById("video");

const msg =
document.getElementById("msg");

/* ===== APPS SCRIPT URL ===== */

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbz3DN4OTGV5bv9idMD689T9raM2doRyk-NGCm3pTXdrc3DIiV0gQrbgCJ7fvD6aJep0/exec";

/* ===== VARIABLES ===== */

let scanLock = false;

let lastScan = "";

/* ===== SOUND ===== */

const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

/* ===== START SCANNER ===== */

async function startScanner(){

try{

msg.innerHTML =
"Opening camera...";

/* OPEN CAMERA */

const stream =
await navigator.mediaDevices.getUserMedia({

video:true,
audio:false

});

video.srcObject = stream;

await video.play();

msg.innerHTML =
"Scanning QR code...";

/* STRONG QR READER */

const codeReader =
new ZXing.BrowserMultiFormatReader();

codeReader.decodeFromVideoDevice(

null,
video,

(result, err) => {

/* QR FOUND */

if(result){

const text =
result.getText().trim();

console.log(
"SCANNED:",
text
);

/* PREVENT DUPLICATES */

if(
scanLock ||
text === lastScan
){
return;
}

scanLock = true;

lastScan = text;

beep.play();

msg.innerHTML =
"QR DETECTED: " + text;

/* SEND TO APPS SCRIPT */

fetch(SCRIPT_URL, {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
adm:text
})

})

.then(res => res.json())

.then(data => {

msg.innerHTML =
data.message;

/* RESET */

setTimeout(() => {

scanLock = false;

lastScan = "";

msg.innerHTML =
"Ready for next scan";

}, 3000);

})

.catch(error => {

msg.innerHTML =
"SERVER ERROR";

console.log(error);

scanLock = false;

});

}

/* IGNORE NORMAL SCAN ERRORS */

if(
err &&
!(err instanceof ZXing.NotFoundException)
){

console.log(err);

}

}

);

}catch(e){

msg.innerHTML =
"CAMERA ERROR: " + e.message;

console.log(e);

}

}

</script>

</body>

</html>
