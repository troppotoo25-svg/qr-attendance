
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Attendance Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

h2{
color:#0b57d0;
}

video{
width:100%;
max-width:450px;
height:320px;
border:3px solid #0b57d0;
border-radius:12px;
background:black;
object-fit:cover;
}

button{
padding:15px 20px;
font-size:18px;
background:#0b57d0;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

#msg{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#0b57d0;
word-wrap:break-word;
}

iframe{
display:none;
}

</style>

</head>

<body>

<h2>QR Attendance Scanner</h2>

<video id="video" autoplay playsinline></video>

<br>

<button id="startBtn">
START CAMERA
</button>

<div id="msg">
Ready
</div>

<iframe name="hiddenFrame"></iframe>

<form
id="hiddenForm"
target="hiddenFrame"
method="POST"
action="https://script.google.com/macros/s/AKfycbzdAWGN4BmgcHjE2e0vtlAVc_Yw5x-7Ya-uE356D0WhpjcYyhk2ajLLClfIj_MxvztS/exec">

<input
type="hidden"
name="adm"
id="hiddenAdm">

</form>

<script>

const startBtn =
document.getElementById("startBtn");

const msg =
document.getElementById("msg");

const video =
document.getElementById("video");

const beep = new Audio(
  "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

let scanLock = false;
startBtn.onclick = async function(){

  try{

    const stream =
    await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:false
    });

    video.srcObject = stream;

    await video.play();

    msg.innerHTML =
    "Scanning...";

    const codeReader =
    new ZXing.BrowserQRCodeReader();

    codeReader.decodeFromVideoDevice(
      null,
      video,
      (result, err) => {

        if(result){

          if(scanLock){
            return;
          }

          scanLock = true;
          beep.currentTime = 0;
  beep.play().catch(() => {});
          
  const adm =
  result.getText().trim();

          const adm =
          result.getText().trim();

          msg.innerHTML =
          "SAVING: " + adm;
            fetch(
"https://script.google.com/macros/s/AKfycbyzUMR8q7W6sa7Jg68gVLTmAUnXPYlNsuGGS8d-mxyEuGdpJapRZHbjsKcjLdqU--ED/exec",
{
              method:"POST",
              body:new URLSearchParams({
                adm:adm
              })
            }
          )
          .then(r => r.text())
          .then(response => {

            msg.innerHTML = response;

            setTimeout(function(){

              msg.innerHTML = "READY";
              scanLock = false;

            },5000);

          })
          .catch(error => {

            msg.innerHTML =
            "ERROR: " + error;

            scanLock = false;

          });

        }

      }
    );

  }

  catch(e){

    alert(
      "CAMERA ERROR: " +
      e.message
    );

  }

};

</script>

</body>
</html>
