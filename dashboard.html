function loadStudents(){

const className =
document.getElementById("classSelect").value;

const tbody =
document.getElementById("studentBody");

tbody.innerHTML = "";

students[className].forEach(student => {

const row =
document.createElement("tr");

row.innerHTML = `

<td>${student.name}</td>

<td>

<select>

</option>

</option>

<option value="ABSENT">
ABSENT
</option>

</select>

</td>

`;

tbody.appendChild(row);

});

}

function saveAttendance(){

const adm =
cells[0].innerText;

const status =

.querySelector("select")
.value;

new FormData();
