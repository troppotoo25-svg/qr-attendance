
<script>

async function loadStudents(){

const className =
document.getElementById(
"classSelect"
).value;

const date =
document.getElementById(
"dateInput"
).value;

const tbody =
document.getElementById(
"studentBody"
);

tbody.innerHTML =
"<tr><td colspan='3'>Loading...</td></tr>";

try{

const response =
await fetch(

"https://script.google.com/macros/s/AKfycbwvGLpWOEUrCU5VVvr12dj9CfaiE8ZL6sKDfEl_igJ4Tm1EQAKLubpfQFKF6ID9rXKK/exec?class="

+ encodeURIComponent(className)

+ "&date="

+ encodeURIComponent(date)

);

const data =
await response.json();

let students = [];
let totalStudents = 0;

if(Array.isArray(data)){

students = data;
totalStudents = data.length;

}

else{

students = data.students || [];
totalStudents = data.totalStudents || 0;

}

tbody.innerHTML = "";

let present = 0;
let late = 0;

if(students.length === 0){

tbody.innerHTML =

"<tr><td colspan='3'>No attendance found</td></tr>";

document.getElementById(
"presentCount"
).innerText = 0;

document.getElementById(
"lateCount"
).innerText = 0;

document.getElementById(
"absentCount"
).innerText = totalStudents;

return;

}

students.forEach(student => {

const row =
document.createElement("tr");

row.innerHTML = `

<td>${student.adm}</td>

<td>${student.name}</td>

<td>${student.status}</td>

`;

tbody.appendChild(row);

if(student.status === "PRESENT"){

present++;

}

else if(student.status === "LATE"){

late++;

}

});

let absent =
totalStudents - (present + late);

if(absent < 0){

absent = 0;

}

document.getElementById(
"presentCount"
).innerText = present;

document.getElementById(
"lateCount"
).innerText = late;

document.getElementById(
"absentCount"
).innerText = absent;

}

catch(error){

tbody.innerHTML =

"<tr><td colspan='3'>ERROR LOADING DATA</td></tr>";

console.log(error);

}

}

function searchStudent(){

const input =
document.getElementById(
"searchInput"
).value.toUpperCase();

const rows =
document.querySelectorAll(
"#studentBody tr"
);

rows.forEach(row => {

const text =
row.innerText.toUpperCase();

if(text.includes(input)){

row.style.display = "";

}

else{

row.style.display = "none";

}

});

}

</script>
```
