
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Attendance Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
padding:20px;
background:#f4f4f4;
}

h1{
text-align:center;
}

.controls{
margin-bottom:20px;
}

input,button{
padding:10px;
margin:5px;
}

.cards{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.2);
min-width:150px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#0b57d0;
color:white;
}

.section{
margin-top:20px;
}

</style>

</head>

<body>

<h1>Attendance Dashboard</h1>

<div class="controls">

<select id="classSelect">
<option value="">Loading Classes...</option>
</select>
<input
type="date"
id="dateInput">

<button onclick="loadStudents()">
LOAD
</button>

<button onclick="window.print()">
PRINT REPORT
</button>

</div>

<div class="cards">

<div class="card">
<h3>Total</h3>
<h2 id="totalCount">0</h2>
</div>

<div class="card">
<h3>Present</h3>
<h2 id="presentCount">0</h2>
</div>

<div class="card">
<h3>Late</h3>
<h2 id="lateCount">0</h2>
</div>

<div class="card">
<h3>Absent</h3>
<h2 id="absentCount">0</h2>
</div>

</div>

<div class="section">

<h2>Present Students</h2>

<table>
<thead>
<tr>
<th>ADM</th>
<th>Name</th>
<th>Status</th>
</tr>
</thead>
<tbody id="presentBody"></tbody>
</table>

</div>

<div class="section">

<h2>Late Students</h2>

<table>
<thead>
<tr>
<th>ADM</th>
<th>Name</th>
<th>Status</th>
</tr>
</thead>
<tbody id="lateBody"></tbody>
</table>

</div>

<div class="section">

<h2>Absent Students</h2>

<table>
<thead>
<tr>
<th>ADM</th>
<th>Name</th>
<th>Status</th>
</tr>
</thead>
<tbody id="absentBody"></tbody>
</table>

</div>

<script>

async function loadClasses(){

const url =
"https://script.google.com/macros/s/AKfycbzB4Q6nww3tG0jnI4ketvDCU8S5IJGDl0iSw5trm2arwiSkf4MCm3WFoxtq7jaVORlJ/exec?action=classes";

const response = await fetch(url);

const classes = await response.json();

const select =
document.getElementById("classSelect");

select.innerHTML = "";

classes.forEach(className => {

select.innerHTML +=
`<option value="${className}">
${className}
</option>`;

});

}

async function loadStudents(){

try{

const className =
document.getElementById("classSelect").value;

const date =
document.getElementById("dateInput").value;

const url =
"https://script.google.com/macros/s/AKfycbzB4Q6nww3tG0jnI4ketvDCU8S5IJGDl0iSw5trm2arwiSkf4MCm3WFoxtq7jaVORlJ/exec?class="
+ encodeURIComponent(className)
+ "&date="
+ encodeURIComponent(date);

alert(url);

const response = await fetch(url);

const text = await response.text();

alert(text);

}
catch(error){

alert("ERROR: " + error);

}

}

window.onload = function(){

document.getElementById("dateInput").value =
new Date().toISOString().split("T")[0];

loadClasses();

};

</script>
</body>
</html>
