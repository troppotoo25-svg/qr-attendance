```html
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Attendance Reports</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h2{
text-align:center;
color:#0b57d0;
}

.card{

background:white;
padding:20px;
border-radius:10px;
max-width:1000px;
margin:auto;

}

.summary{

display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;

}

.box{

flex:1;
padding:20px;
border-radius:10px;
color:white;
font-size:20px;
text-align:center;

}

.present{
background:green;
}

.late{
background:orange;
}

.absent{
background:red;
}

table{

width:100%;
border-collapse:collapse;

}

th,td{

border:1px solid #ccc;
padding:12px;
text-align:center;

}

th{
background:#0b57d0;
color:white;
}

</style>

</head>

<body>

<div class="card">

<h2>Attendance Reports</h2>

<div class="summary">

<div class="box present">

TOTAL PRESENT

<h1 id="presentCount">
0
</h1>

</div>

<div class="box late">

TOTAL LATE

<h1 id="lateCount">
0
</h1>

</div>

<div class="box absent">

TOTAL ABSENT

<h1 id="absentCount">
0
</h1>

</div>

</div>

<table>

<thead>

<tr>

<th>ADM</th>
<th>NAME</th>
<th>CLASS</th>
<th>STATUS</th>

</tr>

</thead>

<tbody id="reportBody">

<tr>

<td>1001</td>
<td>John Doe</td>
<td>Grade 7</td>
<td>PRESENT</td>

</tr>

<tr>

<td>1002</td>
<td>Mary Anne</td>
<td>Grade 7</td>
<td>LATE</td>

</tr>

<tr>

<td>1003</td>
<td>Brian Kim</td>
<td>Grade 8</td>
<td>ABSENT</td>

</tr>

</tbody>

</table>

</div>

<script>

document.getElementById(
"presentCount"
).innerHTML = 1;

document.getElementById(
"lateCount"
).innerHTML = 1;

document.getElementById(
"absentCount"
).innerHTML = 1;

</script>

</body>

</html>
```
