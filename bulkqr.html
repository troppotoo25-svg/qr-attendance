<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bulk QR Generator - 8 Per Page</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial,sans-serif;
padding:20px;
background:#f2f2f2;
margin:0;
}

h2{
text-align:center;
color:#0b57d0;
}

.card{
background:white;
padding:20px;
border-radius:10px;
max-width:1200px;
margin:auto;
}

.controls{
text-align:center;
margin-bottom:20px;
}

input[type=file]{
padding:10px;
}

button{
padding:12px 20px;
background:#0b57d0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
}

.page{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
page-break-after:always;
}

.qrCard{
border:1px solid #000;
padding:10px;
text-align:center;
height:250px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:white;
}

.qrCard h3{
margin:5px 0;
font-size:18px;
}

.qrCard p{
margin:5px 0;
font-size:16px;
font-weight:bold;
}

@media print{

body{
background:white;
padding:0;
}

.controls,
h2{
display:none;
}

.card{
padding:0;
box-shadow:none;
border:none;
}

.page{
margin:0;
page-break-after:always;
}

.qrCard{
height:230px;
}

}

</style>
</head>
<body>

<div class="card">

<h2>Bulk QR Generator (8 Per Page)</h2>

<div class="controls">

<input
type="file"
id="excelFile"
accept=".xlsx,.xls">

<button onclick="window.print()">
PRINT QR CODES
</button>

</div>

<div id="output"></div>

</div>

<script>

document
.getElementById("excelFile")
.addEventListener("change",handleFile);

function handleFile(e){

const file=e.target.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=function(event){

const data=
new Uint8Array(event.target.result);

const workbook=
XLSX.read(data,{type:"array"});

const sheetName=
workbook.SheetNames[0];

const worksheet=
workbook.Sheets[sheetName];

const students=
XLSX.utils.sheet_to_json(worksheet);

const output=
document.getElementById("output");

output.innerHTML="";

for(let i=0;i<students.length;i+=8){

const page=document.createElement("div");
page.className="page";

students.slice(i,i+8).forEach(student=>{

const card=
document.createElement("div");

card.className="qrCard";

const title=
document.createElement("h3");

title.textContent=
student.NAME || "";

const adm=
document.createElement("p");

adm.textContent=
"ADM: " + (student.ADM || "");

const qrDiv=
document.createElement("div");

card.appendChild(title);
card.appendChild(adm);
card.appendChild(qrDiv);

page.appendChild(card);

new QRCode(qrDiv,{
text:String(student.ADM || ""),
width:180,
height:180
});

});

output.appendChild(page);

}

};

reader.readAsArrayBuffer(file);

}

</script>

</body>
</html>
