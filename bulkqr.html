<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bulk QR Generator - 10 Per Page</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial,sans-serif;
padding:20px;
background:#f2f2f2;
margin:0;
}

h2{
text-align:center;
color:#0b57d0;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
max-width:1200px;
margin:auto;
}

.controls{
text-align:center;
margin-bottom:20px;
}

input[type=file]{
padding:10px;
}

button{
padding:12px 20px;
background:#0b57d0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
}

.page{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(4,1fr);
gap:10px;
margin-bottom:20px;
page-break-after:always;
}

.qrCard{
border:1px solid #000;
padding:8px;
text-align:center;
height:155px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:white;
}

.qrCard h3{
margin:3px 0;
font-size:15px;
}

.qrCard p{
margin:3px 0;
font-size:14px;
font-weight:bold;
}

@media print{

body{
background:white;
padding:0;
margin:0;
}

.controls,
h2{
display:none;
}

.card{
padding:0;
border:none;
box-shadow:none;
}

.page{
margin:0;
page-break-after:always;
}

.qrCard{
height:180px;
}

}

</style>
</head>
<body>

<div class="card">

<h2>Bulk QR Generator (10 Per Page)</h2>

<div class="controls">

<input
type="file"
id="excelFile"
accept=".xlsx,.xls">

<button onclick="downloadPDF()">
📄 DOWNLOAD PDF
</button>
</div>

<div id="output"></div>

</div>

<script>

document
.getElementById("excelFile")
.addEventListener("change",handleFile);

function handleFile(e){

const file=e.target.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=function(event){

const data=
new Uint8Array(event.target.result);

const workbook=
XLSX.read(data,{type:"array"});

const sheetName=
workbook.SheetNames[0];

const worksheet=
workbook.Sheets[sheetName];

const students=
XLSX.utils.sheet_to_json(worksheet);

const output=
document.getElementById("output");

output.innerHTML="";

for(let i=0;i<students.length;i+=12){

const page=document.createElement("div");

page.className="page";

students.slice(i,i+12).forEach(student=>{

const card=
document.createElement("div");

card.className="qrCard";

const title=
document.createElement("h3");

title.textContent=
student.NAME || "";

const adm=
document.createElement("p");

adm.textContent=
"ADM: " + (student.ADM || "");

const qrDiv=
document.createElement("div");

card.appendChild(title);
card.appendChild(adm);
card.appendChild(qrDiv);

page.appendChild(card);

new QRCode(qrDiv,{
text:String(student.ADM || ""),
width:90,
height:90
});

});

output.appendChild(page);

}

};

reader.readAsArrayBuffer(file);

}
  function downloadPDF(){

const element = document.getElementById("output");

const opt = {
    margin: 0.2,
    filename: "Student_QR_Codes.pdf",
    image: {
        type: "jpeg",
        quality: 1
    },
    html2canvas: {
        scale: 3,
        useCORS: true
    },
    jsPDF: {
        unit: "mm",
        format: "a4",
        orientation: "portrait"
    }
};

html2pdf().set(opt).from(element).save();

}

</script>

</body>
</html>
